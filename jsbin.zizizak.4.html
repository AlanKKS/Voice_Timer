<meta name="robots" content="noindex">
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>廣東話語音計時器 (時分秒版)</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'PingFang HK', 'Helvetica Neue', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 95%;
            max-width: 420px;
        }
        h1 { font-size: 1.6rem; color: #333; margin-bottom: 5px; }
        #display {
            font-size: 4.2rem; /* 稍微縮細字體以容納 HH:MM:SS */
            font-weight: 700;
            color: #ff4757;
            margin: 15px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
        }
        .inputs-group {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 5px;
            margin-bottom: 15px; 
            font-size: 1.1rem; 
            color: #555;
        }
        input {
            font-size: 1.3rem; 
            padding: 6px; 
            width: 65px; /* 縮窄輸入框等手機易啲睇 */
            text-align: center;
            border-radius: 8px; 
            border: 2px solid #ddd; 
            background-color: #fafafa;
        }
        input:focus { border-color: #1e90ff; outline: none; }
        
        .options-group { margin-bottom: 25px; font-size: 1.1rem; color: #444; }
        select {
            font-size: 1.1rem; padding: 6px 10px; border-radius: 8px;
            border: 2px solid #ddd; background-color: #fff; cursor: pointer;
        }
        select:focus { border-color: #1e90ff; outline: none; }

        .controls { display: flex; flex-direction: column; gap: 12px; }
        .btn-row { display: flex; gap: 10px; }
        button {
            font-size: 1.3rem; padding: 12px; color: white; border: none;
            border-radius: 10px; cursor: pointer; font-weight: bold; transition: all 0.2s; flex: 1;
        }
        #startBtn { background-color: #2ed573; }
        #startBtn:active { background-color: #26af5f; }
        #stopBtn { background-color: #ffa502; }
        #stopBtn:active { background-color: #e69500; }
        #resetBtn { background-color: #747d8c; }
        #resetBtn:active { background-color: #57606f; }
    </style>
</head>
<body>

    <div class="container">
        <h1>廣東話語音計時器</h1>
        <div id="display">00:00:00</div>
        
        <div class="inputs-group">
            <input type="number" id="hoursInput" min="0" max="99" value="0"> 時
            <input type="number" id="minutesInput" min="0" max="59" value="0"> 分
            <input type="number" id="secondsInput" min="0" max="59" value="15"> 秒
        </div>

        <div class="options-group">
            <label for="voiceStartSelect">開始語音倒數：</label>
            <select id="voiceStartSelect">
                <option value="10">最後 10 秒</option>
                <option value="30">最後 30 秒</option>
                <option value="60">最後 1 分鐘</option>
            </select>
        </div>
        
        <div class="controls">
            <button onclick="startTimer()" id="startBtn">開始 / 繼續</button>
            <div class="btn-row">
                <button onclick="stopTimer()" id="stopBtn">停止</button>
                <button onclick="resetTimer()" id="resetBtn">重設</button>
            </div>
        </div>
    </div>

    <audio id="alarmSound" src="https://raw.githubusercontent.com/freeCodeCamp/cdn/master/build/testable-projects-fcc/audio/BeepSound.wav" preload="auto" loop></audio>

    <script>
        let timerInterval = null;
        let totalSecondsLeft = 0;
        let targetEndTime = 0; 
        let isRunning = false;
        let wakeLock = null; 
        
        const alarm = document.getElementById('alarmSound');

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('螢幕喚醒鎖定已啟動');
                }
            } catch (err) {
                console.log('無法鎖定螢幕:', err);
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                    console.log('螢幕喚醒鎖定已解除');
                });
            }
        }

        // 更新顯示格式為 HH:MM:SS
        function updateDisplay(seconds) {
            if (seconds < 0) seconds = 0;
            
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            const displayHrs = hrs.toString().padStart(2, '0');
            const displayMins = mins.toString().padStart(2, '0');
            const displaySecs = secs.toString().padStart(2, '0');
            
            document.getElementById('display').innerText = `${displayHrs}:${displayMins}:${displaySecs}`;
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-HK'; 
            utterance.rate = 1.1; 
            window.speechSynthesis.speak(utterance);
        }

        // 計算總秒數加入咗「小時」
        function initTimeFromInputs() {
            const hrs = parseInt(document.getElementById('hoursInput').value) || 0;
            const mins = parseInt(document.getElementById('minutesInput').value) || 0;
            const secs = parseInt(document.getElementById('secondsInput').value) || 0;
            return (hrs * 3600) + (mins * 60) + secs;
        }

        function timerLoop() {
            const now = Date.now();
            totalSecondsLeft = Math.ceil((targetEndTime - now) / 1000);
            
            if (totalSecondsLeft < 0) totalSecondsLeft = 0;
            
            updateDisplay(totalSecondsLeft);
            const voiceStartThreshold = parseInt(document.getElementById('voiceStartSelect').value);

            if (totalSecondsLeft <= voiceStartThreshold && totalSecondsLeft > 0) {
                speak(totalSecondsLeft.toString());
            } else if (totalSecondsLeft === 0) {
                clearInterval(timerInterval);
                isRunning = false;
                releaseWakeLock(); 
                
                speak("時間到！");
                setTimeout(() => { alarm.play(); }, 1200); 
            }
        }

        function startTimer() {
            if (isRunning) return;

            if (totalSecondsLeft <= 0) {
                totalSecondsLeft = initTimeFromInputs();
                if (totalSecondsLeft <= 0) {
                    alert("請輸入有效嘅時間！");
                    return;
                }
            }

            isRunning = true;
            targetEndTime = Date.now() + (totalSecondsLeft * 1000);
            
            updateDisplay(totalSecondsLeft);
            
            speak(""); 
            alarm.play().then(() => { alarm.pause(); alarm.currentTime = 0; }).catch(e => {});
            requestWakeLock(); 

            timerInterval = setInterval(timerLoop, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            window.speechSynthesis.cancel();
            alarm.pause(); alarm.currentTime = 0;
            isRunning = false;
            releaseWakeLock(); 
        }

        function resetTimer() {
            clearInterval(timerInterval);
            window.speechSynthesis.cancel();
            alarm.pause(); alarm.currentTime = 0;
            isRunning = false;
            releaseWakeLock();
            
            totalSecondsLeft = initTimeFromInputs();
            updateDisplay(totalSecondsLeft);
        }

        updateDisplay(initTimeFromInputs());
        
        // 監聽所有輸入框嘅改動
        document.getElementById('hoursInput').addEventListener('input', () => { if(!isRunning) resetTimer(); });
        document.getElementById('minutesInput').addEventListener('input', () => { if(!isRunning) resetTimer(); });
        document.getElementById('secondsInput').addEventListener('input', () => { if(!isRunning) resetTimer(); });

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isRunning) {
                requestWakeLock();
                timerLoop(); 
            }
        });
    </script>
</body>
</html>
